TABLAS INVOLUCRADAS:
- trips (id, vehicle_id FK, mine_id FK, departure_date DATETIME, return_date DATETIME NULL, origin VARCHAR(150), observations TEXT NULL, status ENUM[scheduled,in_progress,completed,cancelled] DEFAULT scheduled, timestamps)

MODELOS ELOQUENT:
1. app/Models/Trip.php
   - fillable: vehicle_id, mine_id, departure_date, return_date, origin, observations, status
   - casts: departure_date => datetime, return_date => datetime
   - relationships: belongsTo(Vehicle), belongsTo(Mine), hasMany(TripDriver), hasMany(MaintenanceOrder)
   - methods:
     outboundDrivers(): HasMany → tripDrivers WHERE leg=outbound ORDER BY position
     returnDrivers(): HasMany → tripDrivers WHERE leg=return ORDER BY position
     isEditable(): bool → status === scheduled
     canStart(): bool → status === scheduled && vehicle->isAvailable()

2. app/Models/TripDriver.php
   - fillable: trip_id, driver_id, leg, position
   - relationships: belongsTo(Trip), belongsTo(Driver)

3. app/Models/Mine.php
   - fillable: name, region, company, address, latitude, longitude, is_active
   - scope: scopeActive($q)

SERVICES:
4. app/Services/TripService.php

   createTrip(array $data): Trip
   Recibe: vehicle_id, mine_id, departure_date, origin, observations,
           outbound_driver_1_id, outbound_driver_2_id, return_driver_1_id, return_driver_2_id
   Lógica:
   1. Verificar vehicle->status === available → VehicleNotAvailableException
   2. Verificar 4 driver_ids son distintos → DuplicateDriverAssignmentException
   3. Obtener vehicle_type del vehículo (via brandModel)
   4. Por cada driver_id: Driver::find($id)->activeLicenseFor($vehicleType) → InvalidLicenseException si null
   5. DB::transaction():
      - Trip::create([...status=scheduled])
      - TripDriver::create([trip_id, outbound_driver_1_id, leg=outbound, position=1])
      - TripDriver::create([trip_id, outbound_driver_2_id, leg=outbound, position=2])
      - TripDriver::create([trip_id, return_driver_1_id, leg=return, position=1])
      - TripDriver::create([trip_id, return_driver_2_id, leg=return, position=2])
   6. Return $trip->fresh()

   startTrip(Trip $trip): Trip
   1. Verificar status === scheduled
   2. DB::transaction(): trip->update(status=in_progress), trip->vehicle->update(status=on_trip)
   3. Return $trip->fresh()

   completeTrip(Trip $trip, int $finalMileage, ?string $observations): Trip
   1. Verificar status === in_progress
   2. Verificar finalMileage >= trip->vehicle->mileage → InvalidMileageException
   3. DB::transaction():
      - trip->update(status=completed, return_date=now(), observations)
      - trip->vehicle->update(mileage=finalMileage, status=available)
   4. Dispatch CheckPreventiveMaintenance::dispatch($trip->vehicle)
   5. Return $trip->fresh()

   cancelTrip(Trip $trip): Trip
   1. Verificar status === scheduled → ConflictException si no
   2. trip->update(status=cancelled)
   3. Return $trip->fresh()

FILAMENT RESOURCES:
A) TripResource (app/Filament/Resources/TripResource.php)

   - Columna: Vehículo (relationship: vehicle.plate, badge con color de status)
   - Columna: Mina (relationship: mine.name)
   - Columna: Fecha salida (datetime format d/m/Y H:i)
   - Columna: Fecha retorno (nullable)
   - Columna: Choferes ida (count 2, nombres pills)
   - Columna: Estado (badge colors: scheduled=info, in_progress=warning, completed=success, cancelled=gray)
   - Filtros: SelectFilter(status), SelectFilter(mine_id), DateRangeFilter(departure_date)

   - Select(mine_id, solo activas, searchable)
   - Grid 2: DateTimePicker(departure_date, after:now), TextInput(origin)
   - Textarea(observations, nullable)

   Paso 2 "Choferes de ida":
   - Nota informativa: "El vehículo [placa] es de tipo [vehicle_type]. Solo se muestran choferes con licencia válida para este tipo."
   - Select(outbound_driver_1_id, label:"Chofer principal ida", filtrado por vehicle_type activo)
   - Select(outbound_driver_2_id, label:"Chofer secundario ida", filtrado, diferente al anterior)
   - Ambos muestran: nombre, DNI, categoría de licencia, días hasta vencimiento

   Paso 3 "Choferes de vuelta":
   - Select(return_driver_1_id, label:"Chofer principal vuelta")
   - Select(return_driver_2_id, label:"Chofer secundario vuelta")
   - Validación: los 4 drivers deben ser distintos
   - Resumen del viaje antes de confirmar

   ACCIONES personalizadas en tabla:
   - Action "Iniciar viaje" (solo si status=scheduled): llama TripService::startTrip(), confirmar con modal
   - Action "Completar viaje" (solo si status=in_progress): modal con campo TextInput(final_mileage, required, numeric) + Textarea(observations)
   - Action "Cancelar" (solo si status=scheduled): confirmar con modal

B) TripDriversRelationManager
   - Tabla con: leg (badge outbound/return), position, driver nombre+DNI, licencia categoría, días vencimiento
   - Edición permitida solo si trip.status === scheduled
   - Form: Select(leg), Select(position), Select(driver_id filtered)

C) TripMaintenanceRelationManager
   - Lista mantenimientos del viaje
   - Permite crear nueva OM con trip_id preseleccionado

D) MineResource — CRUD simple para catálogo de minas
   - Form: name, region, company, address, Grid 2: latitude+longitude, Toggle(is_active)

E) ActiveTripsWidget (app/Filament/Widgets/ActiveTripsWidget.php)

   - Query: Trip::where('status','in_progress')->with(['vehicle','mine'])->latest()
   - Columnas: vehículo, mina, fecha salida, tiempo transcurrido (computed)
   - Link a detalle del viaje

EXCEPCIONES:
- DuplicateDriverAssignmentException, InvalidLicenseException, VehicleNotAvailableException

Genera código completo PHP 8.3, Laravel 11, Filament v3.`

      text:`Desarrolla el módulo MOD-MAINT completo en Laravel 11 con Filament PHP v3 para el sistema MVMS.

TABLAS INVOLUCRADAS:
- maintenance_orders (id, vehicle_id FK, trip_id FK NULL SET NULL, mechanic_id FK, maintenance_type_id FK, start_date DATETIME, end_date DATETIME NULL, mileage_at_service INT UNSIGNED, description TEXT NULL, status ENUM[pending,in_progress,completed,cancelled] DEFAULT pending, total_cost DECIMAL(10,2) DEFAULT 0.00, timestamps)
- maintenance_order_parts (id, maintenance_order_id FK CASCADE, spare_part_id FK RESTRICT, quantity INT UNSIGNED DEFAULT 1, unit_price DECIMAL(10,2), subtotal DECIMAL(10,2), timestamps)
- maintenance_types (id, name VARCHAR(100) UNIQUE, description TEXT NULL, interval_km INT UNSIGNED NULL, interval_days SMALLINT UNSIGNED NULL, timestamps)

MODELOS ELOQUENT:
1. app/Models/MaintenanceOrder.php
   - fillable: vehicle_id, trip_id, mechanic_id, maintenance_type_id, start_date, end_date, mileage_at_service, description, status, total_cost
   - casts: start_date => datetime, end_date => datetime, total_cost => decimal:2
   - relationships: belongsTo(Vehicle), belongsTo(Trip), belongsTo(Mechanic), belongsTo(MaintenanceType), hasMany(MaintenanceOrderPart)
   - helpers: isOpen():bool → status IN [pending, in_progress]
   - accessor: getPartsCountAttribute(): int

2. app/Models/MaintenanceOrderPart.php
   - fillable: maintenance_order_id, spare_part_id, quantity, unit_price, subtotal
   - casts: unit_price => decimal:2, subtotal => decimal:2
   - relationships: belongsTo(MaintenanceOrder), belongsTo(SparePart)

3. app/Models/MaintenanceType.php
   - fillable: name, description, interval_km, interval_days

SERVICES:
4. app/Services/MaintenanceService.php

   openOrder(array $data): MaintenanceOrder
   $data: vehicle_id, trip_id(nullable), mechanic_id, maintenance_type_id, start_date, mileage_at_service, description
   1. Verificar vehicle->status IN [available, on_trip] → VehicleNotAvailableException
   2. ensureMechanicAvailable($data['mechanic_id']) → MechanicUnavailableException
   3. DB::transaction():
      - MaintenanceOrder::create([..., status=pending])
      - Vehicle::find($data['vehicle_id'])->update(['status'=>'in_maintenance'])
   4. Return $order->fresh()

   private ensureMechanicAvailable(int $mechanicId): void
   - Verifica: MaintenanceOrder::where('mechanic_id',$mechanicId)->whereIn('status',['pending','in_progress'])->exists()
   - Si true → throw new MechanicUnavailableException($mechanicId)

   addPart(MaintenanceOrder $order, int $sparePartId, int $qty): MaintenanceOrderPart
   1. Verificar $order->isOpen() → OrderAlreadyClosedException si false
   2. DB::transaction() con lockForUpdate():
      - $part = SparePart::lockForUpdate()->findOrFail($sparePartId)
      - Verificar $part->stock >= $qty → InsufficientStockException($part->name, $part->stock) si no
      - $unitPrice = $part->unit_price (SNAPSHOT)
      - $line = $order->parts()->create([spare_part_id, quantity=$qty, unit_price=$unitPrice, subtotal=$unitPrice*$qty])
      - $part->decrement('stock', $qty)
      - Dispatch RecalculateOrderCost::dispatch($order)
   3. Return $line->fresh()

   removePart(MaintenanceOrderPart $line): void
   1. Verificar $line->order->isOpen() → OrderAlreadyClosedException
   2. DB::transaction():
      - $line->sparePart->increment('stock', $line->quantity)
      - $line->delete()
      - Dispatch RecalculateOrderCost::dispatch($line->order)

   closeOrder(MaintenanceOrder $order, ?string $notes = null): MaintenanceOrder
   1. Verificar $order->isOpen() → OrderAlreadyClosedException si false
   2. DB::transaction():
      - $total = $order->parts()->sum('subtotal')
      - $order->update([status=completed, end_date=now(), total_cost=$total, description=$notes ?? $order->description])
      - $order->vehicle->update(['status'=>'available'])
   3. Dispatch CheckPreventiveMaintenance::dispatch($order->vehicle, $order->maintenanceType)
   4. Return $order->fresh()

      text:`Desarrolla el módulo MOD-PREV completo en Laravel 11 con Filament PHP v3 para el sistema MVMS.

ESTE MÓDULO NO TIENE INTERFAZ DE ESCRITURA. Es un módulo de inteligencia que corre en background.

ALGORITMO CENTRAL:
Para cada vehículo activo y cada tipo de mantenimiento con intervalos definidos:
1. Busca la última orden COMPLETADA de ese tipo para ese vehículo
2. Verifica umbral por KM: if (vehicle.mileage >= last_mileage_at_service + type.interval_km) → ALERTA
3. Verifica umbral por DÍAS: if (now().diffInDays(last_end_date) >= type.interval_days) → ALERTA

JOB PRINCIPAL:
app/Jobs/CheckPreventiveMaintenance.php (ShouldQueue)

Constructor: (public Vehicle $vehicle, public ?MaintenanceType $specificType = null)

handle():
   $types = $this->specificType
       ? collect([$this->specificType])
       : MaintenanceType::whereNotNull('interval_km')->orWhereNotNull('interval_days')->get();

   foreach ($types as $type) {
       $lastOrder = MaintenanceOrder::where('vehicle_id', $this->vehicle->id)
           ->where('maintenance_type_id', $type->id)
           ->where('status', 'completed')
           ->orderByDesc('end_date')
           ->first();

       // ── KM CHECK ──
       if ($type->interval_km) {
           $baseKm = $lastOrder?->mileage_at_service ?? 0;
           $dueKm  = $baseKm + $type->interval_km;
           $kmOverdue = $this->vehicle->mileage - $dueKm;
           if ($kmOverdue >= 0) {
               $this->createAlert('km', $type, $lastOrder, $kmOverdue);
           }
       }

       // ── DAYS CHECK ──
       if ($type->interval_days) {
           $baseDate = $lastOrder?->end_date ?? $this->vehicle->created_at;
           $daysSince = now()->diffInDays($baseDate);
           $daysOverdue = $daysSince - $type->interval_days;
           if ($daysOverdue >= 0) {
               $this->createAlert('days', $type, $lastOrder, $daysOverdue);
           }
       }
   }

private createAlert(string $triggerType, MaintenanceType $type, ?MaintenanceOrder $lastOrder, int $overdueAmount): void

   - Datos de notificación: vehicle_id, type_id, trigger_type, overdue_amount, last_order_id

const ALL_TAGS = ['all','ops','maint','reports','admin'];
const TAG_LABELS = {all:'Todos',ops:'Operaciones',maint:'Mantenimiento',reports:'Reportes / Preventivo',admin:'Admin / Setup'};
let activeTag = 'all';
let openMods = {};

function renderTabs(){
  document.getElementById('tabs').innerHTML = ALL_TAGS.map(t=>
    `<button class="tab${activeTag===t?' on':''}" onclick="setTag('${t}',this)">${TAG_LABELS[t]}</button>`
  ).join('');
}

function setTag(tag, btn){
  activeTag = tag;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderGrid();
}

function renderGrid(){
  const mods = activeTag==='all' ? MODS : MODS.filter(m=>m.tag===activeTag);
  document.getElementById('grid').innerHTML = mods.map(m=>{
    const isOpen = openMods[m.id];
    return `<div class="mod-card">
      <div class="mod-hdr" onclick="toggleMod('${m.id}')">
        <div class="mod-dot" style="background:${m.color}"></div>
        <span class="mod-name">${m.label}</span>
        <span class="mod-id">${m.id}</span>
        <span class="chevron${isOpen?' open':''}">▶</span>
      </div>
      <div class="mod-body${isOpen?' open':''}">
        ${m.prompts.map((p,pi)=>`
          <div class="prompt-label">${p.sub}</div>
          <div class="copy-btn" onclick="copyPrompt('${m.id}_${pi}',this)">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copiar prompt
          </div>
          <button class="send-btn" onclick="sendToChat('${m.id}_${pi}')">Enviar al chat ↗</button>
          <div class="prompt-box" id="pb_${m.id}_${pi}">${escHtml(p.text)}</div>
        `).join('<div class="section-sep"></div>')}
      </div>
    </div>`;
  }).join('');
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleMod(id){
  openMods[id] = !openMods[id];
  renderGrid();
}

function copyPrompt(key, btn){
  const [modId, pi] = key.split('_');
  const mod = MODS.find(m=>m.id===modId);
  const text = mod.prompts[parseInt(pi)].text;
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');
    btn.textContent = 'Copiado!';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar prompt';},2200);
  });
}

function sendToChat(key){
  const [modId, pi] = key.split('_');
  const mod = MODS.find(m=>m.id===modId);
  sendPrompt(mod.prompts[parseInt(pi)].text);
}

renderTabs();
renderGrid();
</script>
